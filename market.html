<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Analysis · Micro Center Stillwater</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #22d3ee; --orange: #f97316; --red: #f43f5e;
      --bg: #000; --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08); --text: #fafafa; --muted: #a1a1aa;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px); background-size: 28px 28px; pointer-events: none; z-index: 0; }
    body::after { content: ''; position: fixed; left: 0; right: 0; height: 180px; background: linear-gradient(to bottom, transparent 0%, rgba(249,115,22,0.04) 50%, transparent 100%); animation: scanline 10s linear infinite; pointer-events: none; z-index: 1; }
    @keyframes scanline { 0% { top: -200px; } 100% { top: 110vh; } }
    @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

    /* ── PAGE HERO ── */
    .page-hero {
      position: relative; min-height: 40vh; display: flex; align-items: center; justify-content: center;
      overflow: hidden; z-index: 2;
      background: radial-gradient(ellipse at center, rgba(30,12,4,0.95) 0%, rgba(0,0,0,0.98) 55%, #000 100%);
    }
    .page-hero-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 600px; height: 250px; background: radial-gradient(ellipse, rgba(249,115,22,0.12) 0%, transparent 70%); pointer-events: none; }
    .page-hero-content { position: relative; z-index: 2; text-align: center; padding: 60px 24px 40px; }
    .page-hero-tag { display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(249,115,22,0.4); background: rgba(249,115,22,0.08); border-radius: 999px; padding: 6px 16px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--orange); margin-bottom: 20px; }
    .page-hero h1 { font-family: 'Oswald', sans-serif; font-size: clamp(36px,7vw,80px); font-weight: 700; line-height: 0.95; text-transform: uppercase; color: #fff; }
    .page-hero h1 .grad { background: linear-gradient(90deg,#fdba74,#f97316,#ea580c); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite; }
    .page-hero-sub { font-size: 15px; color: #71717a; margin-top: 14px; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }

    /* ── NAV ── */
    #stickyNav { position: sticky; top: 0; z-index: 40; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(0,0,0,0.82); backdrop-filter: blur(20px); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; }
    .nav-logo .grad { background: linear-gradient(90deg,#fdba74,#f97316,#ea580c); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s linear infinite; }
    .nav-cursor { display: inline-block; width: 4px; height: 14px; background: var(--orange); margin-left: 2px; vertical-align: middle; box-shadow: 0 0 8px rgba(249,115,22,0.75); animation: cursorBlink 1.05s steps(1) infinite; }
    .nav-links { display: flex; gap: 20px; overflow-x: auto; }
    .nav-links a { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #52525b; text-decoration: none; transition: color 0.2s; white-space: nowrap; }
    .nav-links a:hover, .nav-links a.active { color: var(--orange); }

    /* ── SECTIONS ── */
    .section { display: block; padding: 64px 24px; max-width: 900px; margin: 0 auto; position: relative; z-index: 2; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
    .section-title { font-family: 'Oswald', sans-serif; font-size: clamp(32px,5vw,52px); font-weight: 700; text-transform: uppercase; line-height: 0.95; color: #fff; margin-bottom: 32px; }
    .section-divider { border: none; border-top: 1px solid rgba(249,115,22,0.12); margin: 0 auto; max-width: 900px; }

    /* ── SW GRID ── */
    .sw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 24px 0; }
    .sw-col { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .sw-col-header { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: #4ade80; }
    .dot-red { background: var(--red); }
    .sw-item { font-size: 13px; color: var(--muted); padding: 7px 0; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 8px; }
    .sw-item:last-child { border-bottom: none; }
    .sw-prefix { font-weight: 600; color: #fff; flex-shrink: 0; }

    /* ── RATINGS ── */
    .rating-row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .rating-label { font-size: 14px; color: #fff; min-width: 220px; }
    .rating-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .rating-bar { height: 100%; background: linear-gradient(90deg,var(--orange),#ea580c); border-radius: 2px; transition: width 1s cubic-bezier(0.16,1,0.3,1); }
    .rating-num { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--orange); min-width: 50px; text-align: right; }
    .rating-avg-box { background: var(--surface); border: 1px solid rgba(249,115,22,0.2); border-radius: 12px; padding: 24px 28px; display: flex; align-items: center; justify-content: space-between; margin-top: 24px; box-shadow: 0 0 60px -20px rgba(249,115,22,0.3); }
    .rating-avg-label { font-size: 13px; color: var(--muted); }
    .rating-avg-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: #3f3f46; margin-top: 2px; }
    .rating-avg-num { font-family: 'Oswald', sans-serif; font-size: 56px; font-weight: 700; color: var(--orange); line-height: 1; }

    /* ── RECOMMENDATION ── */
    .rec-box { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--orange); border-radius: 0 12px 12px 0; padding: 24px; margin: 24px 0; }
    .rec-verdict { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; }
    .rec-box p { font-size: 15px; color: var(--muted); line-height: 1.7; }
    .prose { font-size: 15px; color: var(--muted); line-height: 1.75; margin-bottom: 16px; }

    /* ── CARDS ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin: 24px 0; }
    .card { background: rgba(15,10,5,0.8); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 28px; transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s; cursor: default; }
    .card:hover { border-color: rgba(249,115,22,0.4); box-shadow: 0 0 60px -15px rgba(249,115,22,0.25); transform: translateY(-3px); }
    .card h3 { font-size: 18px; font-weight: 600; margin-bottom: 10px; color: #fff; }
    .card p { font-size: 14px; color: var(--muted); line-height: 1.65; }

    /* ── COMPARISON TABLE ── */
    .compare-table { width: 100%; border-collapse: collapse; margin: 24px 0; }
    .compare-table th { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #52525b; padding: 10px 12px; border-bottom: 1px solid rgba(249,115,22,0.2); text-align: left; }
    .compare-table td { padding: 12px; font-size: 13px; color: var(--muted); border-bottom: 1px solid var(--border); vertical-align: top; }
    .compare-table td:first-child { color: #fff; font-weight: 500; }
    .compare-table tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; padding: 2px 8px; border-radius: 3px; border: 1px solid; }
    .badge-green { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.06); }
    .badge-yellow { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }
    .badge-red { color: var(--red); border-color: rgba(244,63,94,0.3); background: rgba(244,63,94,0.06); }

    /* ── SCROLL EFFECTS ── */
    .scroll-reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .scroll-reveal.revealed { opacity: 1; transform: translateY(0); }
    .scroll-reveal-stagger > * { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
